name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs of the same branch/PR: every push otherwise queues
# a full duplicate job matrix (#27).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint
        # Glob the whole docs surface so a newly added .md is guarded
        # automatically, not silently skipped (#25).
        run: npx markdownlint-cli "**/*.md" --ignore node_modules --config .markdownlint.json

  link-check:
    name: link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --retry-wait-time 5 --max-retries 1 README.md docs/
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-script:
    name: release-manifest script
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: shellcheck scripts
        # The repo's executable logic lives in scripts/*.sh; lint it so shell
        # foot-guns are caught here, not in a release cascade.
        run: shellcheck scripts/*.sh
      - name: release-manifest behavioural tests
        # Guards the 404-vs-transient-failure contract of release-manifest.sh
        # (a 404 falls through to main; a rate-limit/5xx/auth error must NOT
        # silently emit a main-pinned manifest). The suite stubs gh + curl on
        # PATH, so no token or network is needed.
        run: bash scripts/release-manifest.test.sh
      - name: check-ci-pin behavioural tests
        # Guards the pin-check's failure messages: a stale pin, a *missing* pin
        # (snippet removed/rephrased -> empty match), and ambiguous multi-pins
        # must each report clearly. The suite stubs gh on PATH (no token).
        run: bash scripts/check-ci-pin.test.sh

  m1-ci-pin:
    name: m1-ci pin freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: README pins the latest m1-ci release
        # The README's example snippet pins check.yml@vX.Y.Z. Nothing else
        # guards it, so it goes stale the moment m1-ci releases (#26) — fail
        # here so the bump becomes part of every m1-ci release cascade,
        # like tools.env.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Logic lives in scripts/check-ci-pin.sh (shellchecked + unit-tested) so
        # the empty-pin / stale-pin / multi-pin cases are each reported clearly.
        run: bash scripts/check-ci-pin.sh
